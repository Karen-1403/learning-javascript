<!doctype html>
<html>
  <head>
    <title>Calculator</title>
  </head>
  <body>
    <p>Calculator</p>
    <button onclick="updtateCalculation('1')">1</button>
    <button onclick="updtateCalculation('2')">2</button>
    <button onclick="updtateCalculation('3')">3</button>
    <button onclick="updtateCalculation('+')">+</button>

    <p></p>
    <button onclick="updtateCalculation('4')">4</button>
    <button onclick="updtateCalculation('5')">5</button>
    <button onclick="updtateCalculation('6')">6</button>
    <button onclick="updtateCalculation('-')">-</button>
    <p></p>
    <button onclick="updtateCalculation('7')">7</button>
    <button onclick="updtateCalculation('8')">8</button>
    <button onclick="updtateCalculation('9')">9</button>
    <button onclick="updtateCalculation('*')">*</button>
    <p></p>
    <button onclick="updtateCalculation('0')">0</button>
    <button onclick="updtateCalculation('.')">.</button>
    <button onclick="updtateCalculation('=')">=</button>
    <button onclick="updtateCalculation('/')">/</button>
    <p></p>
    <button onclick="updtateCalculation('')">Clear</button>
    <script>
      let calculation = "";
      function updtateCalculation(value) {
        if (value === "=") {
          calculation = eval(calculation);
        } else if (value === "") {
          calculation = "";
        } else {
          calculation += value;
        }
        console.log(calculation);
      }
    </script>
  </body>
</html>
