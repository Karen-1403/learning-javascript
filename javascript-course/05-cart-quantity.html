<!doctype html>
<html>
  <head>
    <title>Cart quantity</title>
  </head>
  <body>
    <p>Cart quatity</p>
    <button onclick="console.log(`Cart quantity: ${cartQuantity}`)">
      Show Quantity
    </button>
    <button
      onclick="
        if (cartQuantity++ < 10) {
          alert('Cart is full');
        } else {
          cartQuantity++;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      Add to cart
    </button>
    <button
      onclick="
        if (cartQuantity + 2 < 10) {
          alert('Cart is full');
        } else {
          cartQuantity += 2;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      +2
    </button>
    <button
      onclick="
        if (cartQuantity + 3 < 10) {
          alert('Cart is full');
        } else {
          cartQuantity += 3;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      +3
    </button>
    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        console.log(`Cart quantity: ${cartQuantity}`);
      "
    >
      Reset cart
    </button>
    <button
      onclick="
        if (cartQuantity <= 0) {
          alert('Not enough items in cart');
        } else {
          cartQuantity--;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      Remove from cart
    </button>
    <button
      onclick="
        if (cartQuantity - 2 < 0) {
          alert('Not enough items in cart');
        } else {
          cartQuantity -= 2;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      -2
    </button>
    <button
      onclick="
        if ((cartQuantity -= 3 < 0)) {
          alert('Not enough items in cart');
        } else {
          cartQuantity -= 3;
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      "
    >
      -3
    </button>
    <script>
      let cartQuantity = 0;
    </script>
  </body>
</html>
