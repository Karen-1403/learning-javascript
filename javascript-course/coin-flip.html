<!doctype html>
<html>
  <body>
    <title>Coin Flip</title>
  </body>
  <script>
    const randomNumber = Math.random();
    let result = "";
    if (randomNumber >= 0 && randomNumber < 0.5) {
      result = "Heads";
    } else if (randomNumber >= 0.5 && randomNumber < 1) {
      result = "Tails";
    }
    const guess = "Heads";
    if (guess === result) {
      alert(`You guessed ${guess}. The coin landed on ${result}. You win!`);
    } else {
      alert(`You guessed ${guess}. The coin landed on ${result}. You lose.`);
    }
  </script>
</html>
